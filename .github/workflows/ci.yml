name: CI
on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lens
          POSTGRES_PASSWORD: lens
          POSTGRES_DB: lecturelens_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql+asyncpg://lens:lens@localhost:5432/lecturelens_test
      DATABASE_URL_SYNC: postgresql+psycopg://lens:lens@localhost:5432/lecturelens_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: test-secret-not-real
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg libmagic1
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .
      - run: mypy app
      - run: bandit -r app
      - run: pytest        # coverage gates via addopts; --cov-fail-under added when code exists

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
